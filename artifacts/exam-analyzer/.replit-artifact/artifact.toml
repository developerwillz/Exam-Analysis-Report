kind = "web"
previewPath = "/"
title = "模考错题分析工具"
version = "1.0.0"
id = "artifacts/exam-analyzer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23072
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/exam-analyzer run dev"

[services.env]
PORT = "23072"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/exam-analyzer", "run", "build"]
publicDir = "artifacts/exam-analyzer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
